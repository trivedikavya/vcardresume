name: PR Guardian
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  protect:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Validate Ownership
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const match = body.match(/#(\d+)/);
            if (!match) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: "❌ **Action Required:** This PR does not link an issue (e.g., #123). Closing in 1 minute."
              });
              await github.rest.pulls.update({ owner: context.repo.owner, repo: context.repo.repo, pull_number: context.issue.number, state: 'closed' });
              return;
            }
            
            const issueNum = match[1];
            const issue = await github.rest.issues.get({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNum });
            const currentAssignee = issue.data.assignee?.login;
            
            if (currentAssignee !== context.actor) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `❌ **Access Denied:** Issue #${issueNum} is assigned to @${currentAssignee}. Only their PR is accepted.`
              });
              await github.rest.pulls.update({ owner: context.repo.owner, repo: context.repo.repo, pull_number: context.issue.number, state: 'closed' });
            }
