name: Issue Greeter
on:
  issues:
    types: [opened]

jobs:
  greet:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Send Welcome Message
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "Thanks for raising this issue, @${{ github.actor }}! 🚀\n\nA maintainer will get back to you within **24 hours**. \n\n*If you don't hear from us by then, feel free to type `/linkedin` and I'll drop the maintainer's contact info!*"
            })
