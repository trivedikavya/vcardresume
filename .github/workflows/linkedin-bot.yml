name: LinkedIn Bot
on:
  issue_comment:
    types: [created]

jobs:
  reply:
    if: contains(github.event.comment.body, '/linkedin')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Share LinkedIn
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "👋 You can connect with **Kavya Trivedi** here: [LinkedIn](https://www.linkedin.com/in/trivedikavya/)"
            });
