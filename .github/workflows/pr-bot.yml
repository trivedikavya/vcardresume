name: PR Guardian
on:
  pull_request:
    types: [opened]

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Greet and Validate
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body ? pr.body.toLowerCase() : "";
            
            // Regex to check for issue linking keywords
            const isLinked = /#\d+|fixes|closes|resolves/.test(body);

            // 1. Initial Greeting
            await github.rest.issues.createComment({
              issue_number: pr.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "Thanks for the PR, @${{ github.actor }}! 👋 We are checking your submission now..."
            });

            if (!isLinked) {
              // 2. Warning Message
              await github.rest.issues.createComment({
                issue_number: pr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: "⚠️ **Action Required:** This PR does not mention a linked issue (e.g., 'Fixes #123'). \n\n**Note:** This PR will be automatically closed in **1 minute** to keep the repo clean. Please link an issue to keep it open!"
              });

              // 3. Wait 60 seconds
              await new Promise(resolve => setTimeout(resolve, 60000));

              // 4. Close PR
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                state: 'closed'
              });

              // 5. Final Closing Message
              await github.rest.issues.createComment({
                issue_number: pr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: "❌ Closing this PR as no linked issue was found. Feel free to reopen it once you've updated the description with a linked issue!"
              });
            }
